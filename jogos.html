<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos - Vila Nova 50Tão</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
     margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

nav{
    background:#b30000;
    padding:25px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    font-weight:bold;
}
font-family:Arial,sans-serif;
max-width:1000px;
margin:auto;
padding:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px 15px;
cursor:pointer;
}

.card{
border:1px solid #ddd;
padding:15px;
margin-top:15px;
border-radius:10px;
}
</style>

</head>

<body>
<nav>

<img src="escudo.png"
style="height:80px; vertical-align:middle; margin-right:20px;">

<a href="index.html">🏠 Início</a>
<a href="jogos.html">⚽ Jogos</a>
<a href="jogadores.html">👥 Jogadores</a>
<a href="financeiro.html">💰 Financeiro</a>
<a href="galeria.html">📸 Galeria</a>

</nav>
<h1>⚽ Cadastro de Jogos</h1>
<div id="areaCadastroJogo">
<input id="adversario" placeholder="Adversário">

<input id="data_jogo" type="date">

<input id="local" placeholder="Local">
<input id="golsVilaNova" type="number" placeholder="Gols Vila Nova">

<input id="golsAdversario" type="number" placeholder="Gols Adversário">
<select id="tipo_jogo">
<option value="Casa">🏠 Casa</option>
<option value="Fora">🚍 Fora</option>
</select>

<select id="uniforme">
<option value="Vermelho">🔴 Vermelho</option>
<option value="Branco">⚪ Branco</option>
<option value="Laranja">🟠 Laranja</option>
<option value="Azul">🔵 Azul</option>
</select>

<textarea id="observacoes" placeholder="Observações"></textarea>

<button onclick="salvarJogo()">Salvar Jogo</button>
</div>
<hr>

<h2>Jogos Cadastrados</h2>

<div id="listaJogos"></div>
<script>

const supabaseUrl = "https://rjmhbimtgvobhkfhmnkj.supabase.co";

const supabaseKey = "sb_publishable_ub_L3pyIFYP3sCjXb_kfpA_MtyRM5rY";
const clienteSupabase = supabase.createClient(supabaseUrl, supabaseKey);
const usuarioLogado =
localStorage.getItem("logado") === "sim";
    window.addEventListener("load", () => {

    if(!usuarioLogado){

        const area =
        document.getElementById("areaCadastroJogo");

        if(area){
            area.style.display = "none";
        }

    }

});
async function salvarJogo(){

    const adversario = document.getElementById('adversario').value;
    const data_jogo = document.getElementById('data_jogo').value;
    const local = document.getElementById('local').value;
    const tipo_jogo = document.getElementById('tipo_jogo').value;
    const uniforme = document.getElementById('uniforme').value;
    const observacoes = document.getElementById('observacoes').value;

  const gols_vila_nova =
document.getElementById("golsVilaNova").value === ""
? null
: Number(document.getElementById("golsVilaNova").value);

const gols_adversario =
document.getElementById("golsAdversario").value === ""
? null
: Number(document.getElementById("golsAdversario").value);

const { error } = await clienteSupabase
    .from('jogos')
    .insert([{
        adversario,
        data_jogo,
        local,
        tipo_jogo,
        uniforme,
        observacoes,
        gols_vila_nova,
        gols_adversario
    }]);

    if(error){
        alert("Erro ao salvar jogo");
        console.log(error);
        return;
    }

    alert("Jogo cadastrado com sucesso!");

    carregarJogos();
}

async function carregarJogos(){

    const { data, error } = await clienteSupabase
    .from('jogos')
    .select('*')
    .order('data_jogo',{ascending:false});

    if(error){
        console.log(error);
        return;
    }

    const lista = document.getElementById('listaJogos');

    lista.innerHTML = '';

    data.forEach(jogo => {

       lista.innerHTML += `
<div style="
background:white;
padding:20px;
margin-top:15px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
">

<h3 style="color:#c00000;margin:0;">
⚽ ${jogo.adversario}
</h3>

<p>📅 ${jogo.data_jogo}</p>

<p>📍 ${jogo.local}</p>

<p>${jogo.tipo_jogo === 'Casa' ? '🏠 Casa' : '🚌 Fora'}</p>

<p>👕 ${jogo.uniforme}</p>

${jogo.gols_vila_nova != null && jogo.gols_adversario != null ? `

<hr>

<p style="
font-size:20px;
font-weight:bold;
color:#c00000;
">
⚽ Vila Nova ${jogo.gols_vila_nova} x ${jogo.gols_adversario} ${jogo.adversario}
</p>

<p style="font-weight:bold;">
${
jogo.gols_vila_nova > jogo.gols_adversario
? '🏆 Vitória'
: jogo.gols_vila_nova < jogo.gols_adversario
? '❌ Derrota'
: '🤝 Empate'
}
</p>

` : `

<hr>

<p style="
font-weight:bold;
color:#0066cc;
">
📅 Jogo agendado
</p>

`}
<button onclick="verDetalhes(${jogo.id})"
style="
background:#c00000;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
">
Ver Detalhes
</button>
${usuarioLogado ? `

<button onclick="editarResultado(${jogo.id})"
style="
background:#0066cc;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin-left:10px;
">
✏️ Resultado
</button>

<button onclick="excluirJogo(${jogo.id})"
style="
background:#cc0000;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin-left:10px;
">
🗑️ Excluir
</button>

` : ''}
</div>
`;
    });

}
function verDetalhes(id){
    window.location.href = "detalhes-jogo.html?id=" + id;
}
    async function editarResultado(id){

    const golsVilaNova =
    prompt("Gols do Vila Nova:");

    if(golsVilaNova === null) return;

    const golsAdversario =
    prompt("Gols do Adversário:");

    if(golsAdversario === null) return;

    const { error } =
    await clienteSupabase
    .from("jogos")
    .update({
        gols_vila_nova: Number(golsVilaNova),
        gols_adversario: Number(golsAdversario)
    })
    .eq("id", id);

    if(error){
        alert(error.message);
        return;
    }

    alert("Resultado atualizado!");

    carregarJogos();
}
  async function excluirJogo(id){

    const confirmar =
    confirm("Deseja realmente excluir este jogo?");

    if(!confirmar) return;

    await clienteSupabase
    .from("jogadores_jogo")
    .delete()
    .eq("jogo_id", id);

    await clienteSupabase
    .from("financeiro")
    .delete()
    .eq("jogo_id", id);

    const { error } =
    await clienteSupabase
    .from("jogos")
    .delete()
    .eq("id", id);

    if(error){
        alert(error.message);
        return;
    }

    alert("Jogo excluído com sucesso!");

    carregarJogos();
}
carregarJogos();

</script>
</body>
</html>
