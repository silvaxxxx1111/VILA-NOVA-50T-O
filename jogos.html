<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos - Vila Nova 50Tão</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial,sans-serif;
max-width:1000px;
margin:auto;
padding:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px 15px;
cursor:pointer;
}

.card{
border:1px solid #ddd;
padding:15px;
margin-top:15px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>⚽ Cadastro de Jogos</h1>

<input id="adversario" placeholder="Adversário">

<input id="data_jogo" type="date">

<input id="local" placeholder="Local">

<select id="tipo_jogo">
<option value="Casa">🏠 Casa</option>
<option value="Fora">🚍 Fora</option>
</select>

<select id="uniforme">
<option value="Vermelho">🔴 Vermelho</option>
<option value="Branco">⚪ Branco</option>
<option value="Laranja">🟠 Laranja</option>
<option value="Azul">🔵 Azul</option>
</select>

<textarea id="observacoes" placeholder="Observações"></textarea>

<button>Salvar Jogo</button>

<hr>

<h2>Jogos Cadastrados</h2>

<div id="listaJogos"></div>

</body>
</html>
