const clienteSupabase =
supabase.createClient(

async function carregarProximosJogos(){

   const { data, error } =
await clienteSupabase
.from("jogos")
.select("*")
.order("data_jogo", { ascending: true })
.limit(3);

if(error){
    console.log(error);
    return;
}

    let html = "";

    data.forEach(jogo => {

       html += `
<div style="
background:#f5f5f5;
padding:12px;
margin-bottom:10px;
border-left:5px solid #c00000;
border-radius:8px;
">

    <strong>📅 ${jogo.data_jogo}</strong><br>

    ⚽ Vila Nova x ${jogo.adversario}

</div>
`;

    });

    document.getElementById("proximosJogos").innerHTML = html;

}

carregarProximosJogos();
