<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl =
"https://rjmhbimtgvobhkfhmnkj.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqbWhiaW10Z3ZvYmhrZmhtbmtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDQ0MDksImV4cCI6MjA5NzEyMDQwOX0.HD84Bf4ZAkRsbtL1sKjSGRW6SQcbbCnjgM9PlxaRPww";

const clienteSupabase =
supabase.createClient(
    supabaseUrl,
    supabaseKey
);
async function carregarCaixaAtual(){

    const { data, error } =
    await clienteSupabase
    .from("financeiro")
    .select("tipo, valor");

    if(error){
        console.log(error);
        return;
    }

    let receitas = 0;
    let despesas = 0;

    data.forEach(item => {

        if(item.tipo === "Receita"){
            receitas += Number(item.valor);
        }else{
            despesas += Number(item.valor);
        }

    });

   const { data: config } =
await clienteSupabase
.from("configuracoes")
.select("*")
.limit(1)
.single();

const saldoInicial =
config ? Number(config.saldo_inicial) : 0;

const saldo = saldoInicial + receitas - despesas;

    document.getElementById("caixaAtual").innerHTML = `
        <h2 style="
        color:${saldo >= 0 ? "green" : "red"};
        margin:0;
        ">
        ${saldo.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
})}
        </h2>
    `;

}
    async function carregarUltimoResultado(){

    const { data, error } =
    await clienteSupabase
    .from("jogos")
    .select("*")
    .not("gols_vila_nova", "is", null)
    .not("gols_adversario", "is", null)
    .order("data_jogo", { ascending:false })
    .limit(1);

    if(error){
        console.log(error);
        return;
    }

    if(!data || data.length === 0){

        document.getElementById("ultimoResultado").innerHTML =
        "Nenhum resultado cadastrado.";



     
        return;
    }

    const jogo = data[0];

    let resultado = "";

    if(jogo.gols_vila_nova > jogo.gols_adversario){
        resultado = "🏆 Vitória";
    }
    else if(jogo.gols_vila_nova < jogo.gols_adversario){
        resultado = "❌ Derrota";
    }
    else{
        resultado = "🤝 Empate";
    }

    document.getElementById("ultimoResultado").innerHTML = `

<div class="placar">
${jogo.gols_vila_nova} x ${jogo.gols_adversario}
</div>

<p style="
font-weight:700;
text-align:center;
font-size:22px;
margin-bottom:10px;
">
Vila Nova x ${jogo.adversario}
</p>

<p style="
text-align:center;
font-size:20px;
font-weight:bold;
color:#c00000;
">
${resultado}
</p>

<p style="text-align:center;">
📅 ${jogo.data_jogo.split("-").reverse().join("/")}
</p>

<p style="text-align:center;">
📍 ${jogo.local}
</p>

`;
}
async function carregarProximoJogo(){

const hoje = new Date().toISOString().split("T")[0];

const { data, error } =
await clienteSupabase
.from("jogos")
.select("*")
.gte("data_jogo", hoje)
.order("data_jogo", { ascending:true })
.limit(1);

if(error){
    console.log(error);
    return;
}

if(!data || data.length === 0){

    document.getElementById("proximoJogo").innerHTML = `
<div style="
text-align:center;
padding:40px 20px;
">

<h2 style="
color:#c00000;
margin-bottom:15px;
">
📅 AGUARDANDO NOVO JOGO
</h2>

<p style="
font-size:18px;
color:#666;
">
Nenhum amistoso cadastrado.
</p>

</div>
`;

    return;
}

const jogo = data[0];

document.getElementById("proximoJogo").innerHTML = `

<h2 style="color:#c00000;margin:10px 0;">
Vila Nova x ${jogo.adversario}
</h2>

<p>📅 ${jogo.data_jogo.split("-").reverse().join("/")}</p>

<p>📍 ${jogo.local}</p>

<p>⏳ Próximo Jogo</p>

`;

}
async function carregarEstatisticas(){

    const { data, error } =
    await clienteSupabase
    .from("jogos")
    .select("gols_vila_nova, gols_adversario");

    if(error){
        console.log(error);
        return;
    }

    let jogos = 0;
    let vitorias = 0;
    let empates = 0;
    let derrotas = 0;

    data.forEach(jogo => {

        const golsVN =
        Number(jogo.gols_vila_nova);

        const golsAdv =
        Number(jogo.gols_adversario);

        if(
            jogo.gols_vila_nova === null ||
            jogo.gols_adversario === null
        ){
            return;
        }

        jogos++;

        if(golsVN > golsAdv){
            vitorias++;
        }
        else if(golsVN < golsAdv){
            derrotas++;
        }
        else{
            empates++;
        }

    });

    document.getElementById("totalJogos").innerText = jogos;
    document.getElementById("totalVitorias").innerText = vitorias;
    document.getElementById("totalEmpates").innerText = empates;
    document.getElementById("totalDerrotas").innerText = derrotas;

}
carregarProximoJogo();
carregarCaixaAtual();
carregarEstatisticas();
carregarUltimoResultado();
    const usuarioLogado =
localStorage.getItem("logado") === "sim";

function sair(){

    localStorage.removeItem("logado");

    alert("Você saiu da comissão.");

    window.location.href = "index.html";
}

if(usuarioLogado){

    document.getElementById("menuComissao").innerHTML = `
    <a href="#" onclick="sair()">
    🚪 Sair
    </a>
    `;

}else{

    document.getElementById("menuComissao").innerHTML = `
    <a href="login.html">
    🔒 Comissão
    </a>
    `;

}
</script>
