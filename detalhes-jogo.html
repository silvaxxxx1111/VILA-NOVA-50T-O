<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalhes do Jogo</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
    color:#c00000;
}
</style>
</head>

<body>

<div class="container">

<h1>⚽ Detalhes do Jogo</h1>

<div class="card" id="dadosJogo">
Carregando...
</div>

<div class="card">
<h2>👥 Jogadores</h2>

<select id="jogadorSelect">
<option value="">Selecione um jogador</option>
</select>

<br><br>

<input id="numeroCamisa" type="number" placeholder="Número da camisa">
<br><br>

<input id="valorPago" type="number" placeholder="Valor pago">
<br><br>

<input id="gols" type="number" placeholder="Gols">
<br><br>

<input id="observacaoJogador" placeholder="Observação">
<br><br>

<button onclick="adicionarJogador()">Adicionar Jogador</button>

<hr>

<div id="listaJogadores"></div>
</div>

<div class="card">
<h2>💰 Financeiro</h2>

<div id="financeiroJogo">
Carregando financeiro...
</div>

</div>

<script>
// ===================== SUPABASE =====================
const supabaseUrl = "https://rjmhbimtgvobhkfhmnkj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqbWhiaW10Z3ZvYmhrZmhtbmtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDQ0MDksImV4cCI6MjA5NzEyMDQwOX0.HD84Bf4ZAkRsbtL1sKjSGRW6SQcbbCnjgM9PlxaRPww"; // <-- coloque sua key correta

const clienteSupabase = supabase.createClient(supabaseUrl, supabaseKey);

// ===================== ID DO JOGO =====================
const params = new URLSearchParams(window.location.search);
const jogoId = Number(params.get("id"));

console.log("JOGO ID:", jogoId);

// ===================== CARREGAR JOGO =====================
async function carregarJogo(){

    const { data, error } = await clienteSupabase
        .from("jogos")
        .select("*")
        .eq("id", jogoId)
        .single();

    if(error){
        console.log(error);
        document.getElementById("dadosJogo").innerHTML =
        "Erro ao carregar jogo";
        return;
    }

    document.getElementById("dadosJogo").innerHTML = `
        <h2>${data.adversario}</h2>
        <p>📅 ${data.data_jogo}</p>
        <p>📍 ${data.local}</p>
        <p>🏠 ${data.tipo_jogo}</p>
        <p>👕 ${data.uniforme}</p>
        <p>📝 ${data.observacoes || ""}</p>
    `;
}
async function carregarFinanceiro(){

    const { data } = await clienteSupabase
    .from("financeiro")
    .select("*")
    .eq("jogo_id", jogoId);

    let receitas = 0;
    let despesas = 0;

    let htmlReceitas = "";
    let htmlDespesas = "";

    data.forEach(item => {

       if(item.tipo === "Receita"){

    receitas += Number(item.valor);

    htmlReceitas += `
    <p>
    🟢 ${item.categoria}
    • R$ ${Number(item.valor).toFixed(2)}

    <button onclick="editarLancamento(${item.id})">
✏️ Editar
</button>

<button onclick="excluirLancamento(${item.id})">
🗑️ Excluir
</button>

    </p>

    ${item.descricao ?
    `<div style="
    margin-left:28px;
    margin-bottom:10px;
    font-weight:bold;
    color:#555;
    ">
    📋 ${item.descricao}
    </div>` : ""}
    `;

}else{

    despesas += Number(item.valor);

    htmlDespesas += `
    <p>
    🔴 ${item.categoria}
    • R$ ${Number(item.valor).toFixed(2)}

<button onclick="editarLancamento(${item.id})">
✏️ Editar
</button>

<button onclick="excluirLancamento(${item.id})">
🗑️ Excluir
</button>

    </p>

    ${item.descricao ?
    `<div style="
    margin-left:28px;
    margin-bottom:10px;
    font-weight:bold;
    color:#555;
    ">
    📋 ${item.descricao}
    </div>` : ""}
    `;

}
    });

    const saldo = receitas - despesas;
let resultadoTexto = "";
let resultadoCor = "";

if(saldo >= 0){
    resultadoTexto = "🟢 LUCRO";
    resultadoCor = "green";
}else{
    resultadoTexto = "🔴 PREJUÍZO";
    resultadoCor = "red";
}
    document.getElementById("financeiroJogo").innerHTML = `

        <p><strong>Receitas:</strong> R$ ${receitas.toFixed(2)}</p>

        <p><strong>Despesas:</strong> R$ ${despesas.toFixed(2)}</p>

        <p style="font-size:22px;font-weight:bold;color:${resultadoCor};">
${resultadoTexto}: R$ ${Math.abs(saldo).toFixed(2)}
</p>

        <hr>

        <h3>🟢 RECEITAS</h3>

        ${htmlReceitas || "<p>Nenhuma receita lançada.</p>"}

        <hr>

        <h3>🔴 DESPESAS</h3>

        ${htmlDespesas || "<p>Nenhuma despesa lançada.</p>"}

    `;

}

  // ===================== CARREGAR JOGADORES (SELECT) =====================
async function carregarJogadores(){

    const { data, error } = await clienteSupabase
        .from('jogadores')
        .select('*')
        .order('nome');

    const select = document.getElementById('jogadorSelect');

    select.innerHTML = '<option value="">Selecione um jogador</option>';

    if(!data) return;

    data.forEach(jogador => {
        select.innerHTML += `
            <option value="${jogador.id}">
                ${jogador.nome}
            </option>
        `;
    });
}

// ===================== ADICIONAR JOGADOR =====================
window.adicionarJogador = async function () {

    const jogador_id = document.getElementById('jogadorSelect').value;
    const numero_camisa = document.getElementById('numeroCamisa').value;
    const valor_pago = document.getElementById('valorPago').value || 0;
    const gols = document.getElementById('gols').value || 0;
    const observacao = document.getElementById('observacaoJogador').value;

    if (!jogador_id) {
        alert("Selecione um jogador");
        return;
    }

    console.log("ID DO JOGO:", jogoId);

    const { data, error } = await clienteSupabase
        .from('jogadores_jogo')
        .insert([{
            jogo_id: jogoId,
            jogador_id,
            numero_camisa,
            valor_pago,
            gols,
            observacao
        }])
        .select();

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if (error) {
        alert("Erro ao adicionar jogador");
        return;
    }

    alert("Jogador adicionado!");

    listarJogadores();
}
// ===================== LISTAR JOGADORES =====================
async function listarJogadores(){

    const { data, error } = await clienteSupabase
        .from('jogadores_jogo')
        .select(`
            *,
            jogadores(nome)
        `)
        .eq('jogo_id', jogoId);

    const lista = document.getElementById('listaJogadores');
    lista.innerHTML = '';

    if(!data) return;

    data.forEach(item => {

        lista.innerHTML += `
            <div style="background:white;padding:10px;margin-top:10px;border-radius:10px;">
                <strong>${item.jogadores?.nome || 'Jogador'}</strong><br>
                👕 Camisa ${item.numero_camisa}<br>
                💰 R$ ${item.valor_pago}<br>
                ⚽ ${item.gols} gols<br>
                📝 ${item.observacao || ''}
            </div>
        `;
    });
}
async function editarLancamento(id){

    const novoValor =
    prompt("Digite o novo valor:");

    if(novoValor === null) return;

    const novaDescricao =
    prompt("Digite a nova descrição:");

    const { error } =
    await clienteSupabase
    .from("financeiro")
    .update({
        valor: Number(novoValor),
        descricao: novaDescricao
    })
    .eq("id", id);

    if(error){
        alert(error.message);
        return;
    }

    alert("Lançamento atualizado!");

    carregarFinanceiro();

}
async function excluirLancamento(id){

    const confirmar =
    confirm("Deseja realmente excluir este lançamento?");

    if(!confirmar) return;

    const { error } =
    await clienteSupabase
    .from("financeiro")
    .delete()
    .eq("id", id);

    if(error){
        alert(error.message);
        return;
    }

    carregarFinanceiro();

}
carregarJogo();
carregarJogadores();
listarJogadores();
carregarFinanceiro();
</script>

</body>
</html>
