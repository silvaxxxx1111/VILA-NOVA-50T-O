<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalhes do Jogo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
    color:#c00000;
}

</style>
</head>

<body>

<div class="container">

<h1>⚽ Detalhes do Jogo</h1>

<div class="card" id="dadosJogo">
Carregando...
</div>

<div class="card">
<h2>👥 Jogadores</h2>

<p>Em breve...</p>

</div>

<div class="card">
<h2>💰 Financeiro</h2>

<p>Em breve...</p>

</div>

</div>

<script>

const supabaseUrl = "https://rjmhbimtgvobhkfhmnkj.supabase.co/rest/v1/";
const supabaseKey = "sb_publishable_ub_L3pyIFYP3sCjXb_kfpA_MtyRM5rY";

const clienteSupabase =
supabase.createClient(supabaseUrl, supabaseKey);

const params = new URLSearchParams(window.location.search);

const jogoId = params.get("id");

async function carregarJogo(){

const { data, error } =
await clienteSupabase
.from("jogos")
.select("*")
.eq("id", jogoId)
.single();

if(error){

document.getElementById("dadosJogo").innerHTML =
"Erro ao carregar jogo";

return;

}

document.getElementById("dadosJogo").innerHTML = `
<h2>${data.adversario}</h2>

<p>📅 ${data.data_jogo}</p>

<p>📍 ${data.local}</p>

<p>🏠 ${data.tipo_jogo}</p>

<p>👕 ${data.uniforme}</p>

<p>📝 ${data.observacoes || ""}</p>
`;

}

carregarJogo();

</script>

</body>
</html>
