Carregando jogadores...
</div>

</div>

<script>

const supabaseUrl = "https://rjmhbimtgvobhkfhmnkj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqbWhiaW10Z3ZvYmhrZmhtbmtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDQ0MDksImV4cCI6MjA5NzEyMDQwOX0.HD84Bf4ZAkRsbtL1sKjSGRW6SQcbbCnjgM9PlxaRPww";

const clienteSupabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function carregarJogadores() {

   const { data, error } = await clienteSupabase
      .from('jogadores')
      .select('*')
      .order('nome');

    if(error){
        document.getElementById("lista-jogadores").innerHTML =
        "Erro ao carregar jogadores";
        console.log(error);
        return;
    }

    let html = "";

    data.forEach(jogador => {
        html += `
        <div class="jogador">
            👤 ${jogador.nome}
        </div>
        `;
    });

    document.getElementById("lista-jogadores").innerHTML = html;
}

carregarJogadores();

</script>
