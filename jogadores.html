<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogadores - Vila Nova 50Tão</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

nav{
    background:#b30000;
    padding:25px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    font-weight:bold;
}

.container{
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}

h1{
    color:#b30000;
}

.jogador{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
    cursor:pointer;
}
.btn-add{
    background:#b30000;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    margin-bottom:20px;
}

.btn-add:hover{
    opacity:0.9;
}    
</style>
</head>

<body>

<nav>

<img src="escudo.png"
style="height:80px; vertical-align:middle; margin-right:20px;">

<a href="index.html">🏠 Início</a>
<a href="jogos.html">⚽ Jogos</a>
<a href="jogadores.html">👥 Jogadores</a>
<a href="financeiro.html">💰 Financeiro</a>
<a href="galeria.html">📸 Galeria</a>

</nav>

<div class="container">

<h1>👥 Jogadores</h1>
<button
id="btnAdicionarJogador"
class="btn-add"
onclick="adicionarJogador()">
➕ Adicionar Jogador
</button>
<div id="lista-jogadores">
Carregando jogadores...
</div>

</div>

<script>

const supabaseUrl = "https://rjmhbimtgvobhkfhmnkj.supabase.co";
const supabaseKey = "sb_publishable_ub_L3pyIFYP3sCjXb_kfpA_MtyRM5rY";

const clienteSupabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);
const usuarioLogado =
localStorage.getItem("logado") === "sim";
    window.addEventListener("load", () => {

    if(!usuarioLogado){

        document.getElementById(
        "btnAdicionarJogador"
        ).style.display = "none";

    }

});
async function carregarJogadores() {

   const { data, error } = await clienteSupabase
      .from('jogadores')
      .select('*')
      .order('nome');

    if(error){
        document.getElementById("lista-jogadores").innerHTML =
        "Erro ao carregar jogadores";
        console.log(error);
        return;
    }

    let html = "";

    data.forEach(jogador => {
    html += `
    <div class="jogador">
        👤 ${jogador.nome}

        <br><br>

       ${usuarioLogado ? `
<button onclick="editarJogador(${jogador.id}, '${jogador.nome}')">
    ✏️ Editar
</button>
` : ''}
    </div>
    `;
});

    document.getElementById("lista-jogadores").innerHTML = html;
}
async function adicionarJogador(){

    const nome = prompt("Digite o nome do jogador:");

    if(!nome) return;

    const { error } = await clienteSupabase
        .from('jogadores')
        .insert([
            { nome: nome }
        ]);

    if(error){
        alert("Erro ao adicionar jogador");
        console.log(error);
        return;
    }
if(!usuarioLogado){

    document.getElementById(
    "btnAdicionarJogador"
    ).style.display = "none";

}
    carregarJogadores();
}
    async function editarJogador(id, nomeAtual){

    const novoNome = prompt("Editar jogador:", nomeAtual);

    if(!novoNome) return;

    const { error } = await clienteSupabase
        .from('jogadores')
        .update({ nome: novoNome })
        .eq('id', id);

    if(error){
        alert("Erro ao editar jogador");
        console.log(error);
        return;
    }

    carregarJogadores();
}
carregarJogadores();

</script>

</body>
</html>
