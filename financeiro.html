<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro - Vila Nova 50Tão</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

nav{
    background:#b30000;
    padding:25px;
    text-align:center;
    border-radius:12px;
    margin-bottom:20px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    font-weight:bold;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    padding:10px 15px;
    cursor:pointer;
}
</style>

</head>
<body>

<nav>
<div class="container">
<img src="escudo.png"
style="height:80px; vertical-align:middle; margin-right:20px;">

<a href="index.html">🏠 Início</a>
<a href="jogos.html">⚽ Jogos</a>
<a href="jogadores.html">👥 Jogadores</a>
<a href="financeiro.html">💰 Financeiro</a>
<a href="galeria.html">📸 Galeria</a>

</nav>
.container{
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}
<h1>Financeiro</h1>

<div class="card">
<h3>Novo lançamento</h3>
<div id="areaCadastroFinanceiro">
<select id="tipo">
    <option value="Receita">Receita</option>
    <option value="Despesa">Despesa</option>
</select>

<select id="categoria">
<textarea
id="detalhamento"
placeholder="Exemplo:

14x20
1x10

Cada linha = quantidade x valor"
rows="5"
style="width:100%;margin-top:10px;margin-bottom:10px;"></textarea>
    <optgroup label="RECEITAS">
        <option value="Cota Jogador">Cota Jogador</option>
        <option value="Passagem">Passagem</option>
        <option value="Cota Recebida">Cota Recebida</option>
        <option value="Contribuição">Contribuição</option>
        <option value="Patrocínio">Patrocínio</option>
        <option value="Doação">Doação</option>
        <option value="Rifa/Bingo">Rifa/Bingo</option>
        <option value="Outros">Outros</option>
    </optgroup>

    <optgroup label="DESPESAS">
        <option value="Água">Água</option>
        <option value="Frente">Frente</option>
        <option value="Goleiro">Goleiro</option>
        <option value="Barca">Barca</option>
        <option value="Arbitragem">Arbitragem</option>
        <option value="Transporte">Transporte</option>
        <option value="Cota Time Adversário">Cota Time Adversário</option>
        <option value="Outros">Outros</option>
    </optgroup>

</select>

<div id="camposPessoas">

    <h4>Participações</h4>

    <input
        type="number"
        id="qtd1"
        placeholder="Quantidade grupo 1">

    <input
        type="number"
        id="valor1"
        placeholder="Valor grupo 1">

    <input
        type="number"
        id="qtd2"
        placeholder="Quantidade grupo 2">

    <input
        type="number"
        id="valor2"
        placeholder="Valor grupo 2">

</div>

<div id="campoValorUnico" style="display:none;">

    <h4>Valor</h4>

    <input
        type="number"
        id="valorManual"
        placeholder="Valor">

</div>

<input
    type="number"
    id="valor"
    placeholder="Total"
    readonly>
<input
    type="text"
    id="descricao"
    placeholder="Descrição">

<select id="jogo"></select>

<button onclick="salvarLancamento()">
Salvar lançamento
</button>
</div>

<div class="card">
<h3>Lançamentos</h3>
<div id="listaFinanceiro"></div>
</div>
<script>

const supabaseUrl = "https://rjmhbimtgvobhkfhmnkj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqbWhiaW10Z3ZvYmhrZmhtbmtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDQ0MDksImV4cCI6MjA5NzEyMDQwOX0.HD84Bf4ZAkRsbtL1sKjSGRW6SQcbbCnjgM9PlxaRPww";

const clienteSupabase =
supabase.createClient(supabaseUrl, supabaseKey);
const usuarioLogado =
localStorage.getItem("logado") === "sim";

window.addEventListener("load", () => {

    if(!usuarioLogado){

        const area =
        document.getElementById("areaCadastroFinanceiro");

        if(area){
            area.style.display = "none";
        }

    }

});
async function carregarJogos(){

    const { data } = await clienteSupabase
    .from("jogos")
    .select("*")
    .order("data_jogo");

    const select = document.getElementById("jogo");

    select.innerHTML =
    '<option value="">Sem jogo</option>';

    data.forEach(jogo => {

        select.innerHTML += `
        <option value="${jogo.id}">
        ${jogo.adversario}
        </option>
        `;

    });

}

async function salvarLancamento(){

    const tipo =
    document.getElementById("tipo").value;

    const categoria =
    document.getElementById("categoria").value;

    const qtd1 =
    Number(document.getElementById("qtd1").value) || 0;

    const valor1 =
    Number(document.getElementById("valor1").value) || 0;

    const qtd2 =
    Number(document.getElementById("qtd2").value) || 0;

    const valor2 =
    Number(document.getElementById("valor2").value) || 0;

    const valorCalculado =
(qtd1 * valor1) +
(qtd2 * valor2);

const valorManual =
Number(document.getElementById("valorManual").value) || 0;

const valor =
valorCalculado > 0
? valorCalculado
: valorManual;

   let descricao =
document.getElementById("descricao").value;

if(
    categoria === "Cota Jogador" ||
    categoria === "Contribuição" ||
    categoria === "Passagem"
){

    descricao = "";

    if(qtd1 > 0){
        descricao += `${qtd1}x${valor1}`;
    }

    if(qtd2 > 0){
        descricao += ` + ${qtd2}x${valor2}`;
    }

}

    const jogo_id =
    document.getElementById("jogo").value || null;

    const { error } =
    await clienteSupabase
    .from("financeiro")
    .insert([{
        tipo,
        categoria,
        quantidade: qtd1 + qtd2,
        valor_unitario: 0,
        valor,
        descricao,
        jogo_id,
        data_lancamento:
        new Date().toISOString().split("T")[0]
    }]);

    if(error){
        console.log(error);
        alert(error.message);
        return;
    }

    alert("Lançamento salvo");

    document.getElementById("qtd1").value = "";
    document.getElementById("valor1").value = "";
    document.getElementById("qtd2").value = "";
    document.getElementById("valor2").value = "";
    document.getElementById("valor").value = "";
    document.getElementById("descricao").value = "";

    listarFinanceiro();
}
function controlarCampos(){

    const categoria =
    document.getElementById("categoria").value;

    const categoriasComPessoas = [
        "Cota Jogador",
        "Contribuição",
        "Passagem"
    ];

    if(categoriasComPessoas.includes(categoria)){

        document.getElementById("camposPessoas")
        .style.display = "block";

        document.getElementById("campoValorUnico")
        .style.display = "none";

    }else{

        document.getElementById("camposPessoas")
        .style.display = "none";

        document.getElementById("campoValorUnico")
        .style.display = "block";

    }

}

document
.getElementById("categoria")
.addEventListener("change", controlarCampos);
    async function excluirLancamento(id){

    const confirmar =
    confirm("Deseja excluir este lançamento?");

    if(!confirmar) return;

    const { error } =
    await clienteSupabase
    .from("financeiro")
    .delete()
    .eq("id", id);

    if(error){
        alert(error.message);
        return;
    }

    alert("Lançamento excluído!");

    listarFinanceiro();

}
async function listarFinanceiro(){

    const { data } =
    await clienteSupabase
    .from("financeiro")
    .select("*")
    .order("id", { ascending:false });

    const lista =
    document.getElementById("listaFinanceiro");

    lista.innerHTML = "";

    let receitas = 0;
    let despesas = 0;

    data.forEach(item => {

        if(item.tipo === "Receita"){
            receitas += Number(item.valor);
        }else{
            despesas += Number(item.valor);
        }

       lista.innerHTML += `
<div style="
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
border-radius:10px;
">

<strong>${item.tipo}</strong><br>
Categoria: ${item.categoria}<br>
Valor: R$ ${item.valor}<br>
${item.descricao || ""}

<br><br>

${usuarioLogado ? `
<button onclick="excluirLancamento(${item.id})"
style="
background:#cc0000;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
">
🗑️ Excluir
</button>
` : ''}

</div>
`;

    });

    lista.innerHTML =
    `
    <div style="margin-bottom:20px;">
    <strong>Receitas:</strong> R$ ${receitas}<br>
    <strong>Despesas:</strong> R$ ${despesas}<br>
    <strong>Saldo:</strong> R$ ${receitas - despesas}
    </div>
    ` + lista.innerHTML;

}
function calcularTotal(){

    const qtd1 =
    Number(document.getElementById("qtd1").value) || 0;

    const valor1 =
    Number(document.getElementById("valor1").value) || 0;

    const qtd2 =
    Number(document.getElementById("qtd2").value) || 0;

    const valor2 =
    Number(document.getElementById("valor2").value) || 0;

    document.getElementById("valor").value =
    (qtd1 * valor1) + (qtd2 * valor2);

}

document
.getElementById("qtd1")
.addEventListener("input", calcularTotal);

document
.getElementById("valor1")
.addEventListener("input", calcularTotal);

document
.getElementById("qtd2")
.addEventListener("input", calcularTotal);

document
.getElementById("valor2")
.addEventListener("input", calcularTotal);

controlarCampos();
carregarJogos();
listarFinanceiro();

</script>
    </div>
    
</body>
</html>
