<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeria - Vila Nova 50Tão</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

nav{
    background:#b30000;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:30px auto;
    padding:20px;
}

h1{
    color:#b30000;
}

#galeria{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.foto{
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
}

.foto img{
    width:100%;
    border-radius:8px;
}

button{
    background:#b30000;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<nav>
<a href="index.html">🏠 Início</a>
<a href="jogos.html">⚽ Jogos</a>
<a href="jogadores.html">👥 Jogadores</a>
<a href="financeiro.html">💰 Financeiro</a>
<a href="galeria.html">📸 Galeria</a>
</nav>

<div class="container">

<h1>📸 Galeria Vila Nova 50Tão</h1>

<div id="areaUpload">

<input type="file" id="foto">

<br><br>

<button onclick="enviarFoto()">
Enviar Foto
</button>

<hr>

</div>

<div id="galeria">
Carregando...
</div>

</div>

<script>

const supabaseUrl =
"https://rjmhbimtgvobhkfhmnkj.supabase.co";

const supabaseKey =
"sb_publishable_ub_L3pyIFYP3sCjXb_kfpA_MtyRM5rY";

const clienteSupabase =
supabase.createClient(
supabaseUrl,
supabaseKey
);

const usuarioLogado =
localStorage.getItem("logado") === "sim";

if(!usuarioLogado){
    document.getElementById("areaUpload").style.display = "none";
}

async function carregarGaleria(){

    const { data, error } =
    await clienteSupabase
    .storage
    .from("galeria")
    .list();

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if(error){
        document.getElementById("galeria").innerHTML =
        "ERRO: " + error.message;
        return;
    }

    if(!data || data.length === 0){
        document.getElementById("galeria").innerHTML =
        "Nenhuma foto encontrada";
        return;
    }

    let html = "";

    data.forEach(arquivo => {

        const url =
        `${supabaseUrl}/storage/v1/object/public/galeria/${arquivo.name}`;

        html += `
        <div class="foto">
            <img src="${url}">
            <p>${arquivo.name}</p>
        </div>
        `;
    });

    document.getElementById("galeria").innerHTML = html;
}

async function enviarFoto(){

    const arquivo =
    document.getElementById("foto").files[0];

    if(!arquivo){
        alert("Selecione uma foto");
        return;
    }

    const nome =
    Date.now() + "_" + arquivo.name;

    const { error } =
    await clienteSupabase
    .storage
    .from("galeria")
    .upload(nome, arquivo);

    if(error){
        alert("Erro ao enviar");
        console.log(error);
        return;
    }

    carregarGaleria();
}

async function excluirFoto(nome){

    if(!confirm("Excluir foto?")) return;

    await clienteSupabase
    .storage
    .from("galeria")
    .remove([nome]);

    carregarGaleria();
}

carregarGaleria();

</script>

</body>
</html>
