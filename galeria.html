<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeria - Vila Nova 50Tão</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

nav{
    background:#b30000;
    padding:25px;
    text-align:center;
}


nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:30px auto;
    padding:20px;
}

h1{
    color:#b30000;
}

#galeria{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.foto{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    width:340px;
    transition:0.3s;
}
.foto:hover{
    transform:translateY(-5px);
}
.foto img{
    width:100%;
    border-radius:10px;
}

button{
    background:#b30000;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<nav>

<img src="escudo.png"
style="height:80px; vertical-align:middle; margin-right:20px;">


<a href="index.html">🏠 Início</a>
<a href="jogos.html">⚽ Jogos</a>
<a href="jogadores.html">👥 Jogadores</a>
<a href="financeiro.html">💰 Financeiro</a>
<a href="galeria.html">📸 Galeria</a>

</nav>

<div class="container">

<h1>📸 Galeria Vila Nova 50Tão</h1>

<div id="areaUpload">

<input type="file" id="foto">

<br><br>

<select id="jogo">
<option value="">Sem jogo</option>
</select>

<br><br>

<input
type="text"
id="descricao"
placeholder="Descrição da foto">

<br><br>

<input
type="date"
id="data_foto">

<br><br>

<button onclick="enviarFoto()">
📤 Enviar Foto
</button>
<hr>

</div>

<div id="galeria">
Carregando...
</div>

</div>

<script>

const supabaseUrl =
"https://rjmhbimtgvobhkfhmnkj.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqbWhiaW10Z3ZvYmhrZmhtbmtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDQ0MDksImV4cCI6MjA5NzEyMDQwOX0.HD84Bf4ZAkRsbtL1sKjSGRW6SQcbbCnjgM9PlxaRPww";

const clienteSupabase =
supabase.createClient(
supabaseUrl,
supabaseKey
);
    const usuarioLogado =
localStorage.getItem("logado") === "sim";

if(!usuarioLogado){
    document.getElementById("areaUpload").style.display = "none";
}
async function carregarJogos(){

    const { data, error } =
    await clienteSupabase
    .from("jogos")
    .select("*")
    .order("data_jogo", { ascending:false });

    console.log(data);
    console.log(error);

    let html =
    '<option value="">Sem jogo</option>';

    if(!data) return;

    data.forEach(jogo => {

        html += `
        <option value="${jogo.id}">
        ${jogo.adversario}
        </option>
        `;

    });

    document.getElementById("jogo").innerHTML =
    html;
}
async function carregarGaleria(){

    const { data, error } =
    await clienteSupabase
    .from("galeria")
    .select("*")
    .order("id", { ascending:false });

    if(error){
        console.log(error);
        return;
    }

    let html = "";

    data.forEach(foto => {

        html += `
<div class="foto" style="
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
margin:15px;
display:inline-block;
width:320px;
vertical-align:top;
">

<img
src="${foto.imagem}"
style="
width:100%;
border-radius:10px;
">

<h3 style="
margin-top:10px;
color:#c00000;
">
⚽ Vila Nova 50Tão x ${foto.categoria || "Sem jogo"}
</h3>

<p>
📅 ${foto.data_foto || ""}
</p>

<p>
📝 ${foto.descricao || ""}
</p>

${usuarioLogado ? `
<button onclick="excluirFoto(${foto.id})"
style="
background:#d60000;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
">
🗑️ Excluir
</button>
` : ""}

</div>
`;
    });

    document.getElementById("galeria").innerHTML = html;
}

async function enviarFoto(){

    const arquivo =
    document.getElementById("foto").files[0];

    if(!arquivo){
        alert("Selecione uma foto");
        return;
    }

    const nome =
    Date.now() + "_" + arquivo.name;
const descricao =
document.getElementById("descricao").value;

const dataFoto =
document.getElementById("data_foto").value;

const jogoId =
document.getElementById("jogo").value || null;
    const { error } =
    await clienteSupabase
    .storage
    .from("galeria")
    .upload(nome, arquivo);
if(error){
    alert("Erro ao enviar");
    console.log(error);
    return;
}

const url =
`${supabaseUrl}/storage/v1/object/public/galeria/${nome}`;

const nomeJogo =
document.getElementById("jogo")
.options[
document.getElementById("jogo").selectedIndex
].text;

const { error: erroBanco } =
await clienteSupabase
.from("galeria")
.insert([{
    imagem: url,
    categoria: nomeJogo,
    descricao: descricao,
    data_foto: dataFoto,
    jogo_id: jogoId
}]);

if(erroBanco){
    console.log(erroBanco);
    alert("Erro ao salvar dados da foto");
    return;
}
    

    carregarGaleria();
}

async function excluirFoto(nome){

    if(!confirm("Excluir foto?")) return;

    await clienteSupabase
    .storage
    .from("galeria")
    .remove([nome]);

    carregarGaleria();
}
async function excluirFoto(id){

    if(!confirm("Deseja excluir esta foto?")){
        return;
    }

    const { error } =
    await clienteSupabase
    .from("galeria")
    .delete()
    .eq("id", id);

    if(error){
        alert("Erro ao excluir foto");
        console.log(error);
        return;
    }

    alert("Foto excluída!");

    carregarGaleria();
}
carregarJogos();
carregarGaleria();

</script>

</body>
</html>
